# https://taskfile.dev

# Task is used purely for building/testing the lua code. Actual setup is via make + bootstrap.sh

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  build:
    sources:
      - src/lua/**/*.lua
      - dotfiles-dev-1.rockspec
    cmds:
      - ./luarocks make

  test:
    desc: Run all tests (Lua and shell)
    cmds:
      - task: test-lua
      - task: test-shell

  test-lua:
    desc: Run Lua tests with busted
    deps: [build]
    cmds:
      - ./luarocks test -- {{.CLI_ARGS}}

  test-shell:
    desc: Run shell tests with bats
    cmds:
      - spec/bats/bin/bats spec/bootstrap.bats {{.CLI_ARGS}}
